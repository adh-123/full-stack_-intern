
<html>
<head>
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
}

.sidebar{
    width:150px;
    height:100vh;
    background:black;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
}

.sidebar a:hover{
    background:blueviolet;
}
.sidebar a.active{
    background:blueviolet;
    
}

.header{
    margin-left:190px;
    height:65px;
    background:#3498db;
    color:white;
    display:flex;
    align-items:center;
    padding-left:20px;
}

.content{
    display:block;
    margin-left:200px;
    padding:1px;
}
.hide{
    display: none;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<a id="menu-home"onclick="onMenuClick('home')">Home</a>
<a id="menu-user"onclick="onMenuClick('user')">Users</a>
<a id="menu-reports"onclick="onMenuClick('reports')">Reports</a>
<a id="menu-settings"onclick="onMenuClick('settings')">Settings</a>
</div>

<div class="header">
<h2>My Dashboard</h2>
</div>

<div class="hide" id="home">
<h3>Welcome</h3>
<p>This is the home content area.</p>
</div>
<div class="hide" id="user">
<h3>Welcome</h3>
<p>This is the users content area.</p>
</div>
<div class="hide" id="reports">
<h3>Welcome</h3>
<p>This is the report content area.</p>
</div>
<div class="hide" id="settings">
<h3>Welcome</h3>
<p>This is the settings content area.</p>
</div>

<script>
function onMenuClick(menu){
document.getElementById("home").className="hide"
document.getElementById("user").className="hide"
document.getElementById("reports").className="hide"
document.getElementById("settings").className="hide"
document.getElementById(menu).className="content"
document.getElementById("menu-home").classList.remove("active")
document.getElementById("menu-user").classList.remove("active")
document.getElementById("menu-reports").classList.remove("active")
document.getElementById("menu-settings").classList.remove("active")
document.getElementById("menu-"+menu).classList.add("active")
}
</script>
</body>
</html>
